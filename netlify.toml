[functions]
  directory = "netlify/functions"

[build]
  publish = "dist"
  command = "npm run build"

[dev]
  command = "npm run dev"
  targetPort = 4321
  port = 8888
  autoLaunch = false
  framework = "#custom"
  # No usar dist/ en dev: un astro build escribe ahí y netlify dev deja de usar las functions locales
  publish = "dev-publish"

[dev.environment]
  NODE_ENV = "development"

[template]
  required-extensions = ["supabase"]