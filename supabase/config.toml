# Bondia — Supabase CLI (remoto vinculado con `supabase link`)
# Docs: https://supabase.com/docs/guides/cli

project_id = "bondia"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
